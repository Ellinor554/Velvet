<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Velvet — Music Discovery</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1C1410" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Velvet" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.3.0/dist/tabler-icons.min.css" />
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>
<div id="app">

  <!-- HOME -->
  <div id="screen-home" class="screen active">
    <div class="top-bar">
      <div class="wordmark">Velvet<span>music discovery</span></div>
      <i class="ti ti-adjustments-horizontal" style="font-size:20px;color:var(--esp-muted);cursor:pointer" aria-hidden="true"></i>
    </div>
    <div class="search-wrap">
      <div class="search-box">
        <i class="ti ti-search" aria-hidden="true"></i>
        <input class="search-input" placeholder="Type an artist you love..." />
      </div>
    </div>
    <div class="genre-label">Quick picks</div>
    <div class="pills">
      <div class="pill active">Indie Folk</div>
      <div class="pill">Dark Synth</div>
      <div class="pill">Underground Hip-Hop</div>
      <div class="pill">Lo-fi Soul</div>
      <div class="pill">Neo-Psychedelia</div>
      <div class="pill">Ambient Post-Rock</div>
    </div>
    <div class="section-divider"></div>
    <div class="recs-label">
      <h2>Picked for tonight</h2>
      <p>Based on your taste profile</p>
    </div>
    <div class="rec-scroll" id="recScroll"></div>
  </div>

  <!-- DISCOVER -->
  <div id="screen-discover" class="screen card-screen">
    <div class="card-progress" style="width:100%">
      <div class="prog-dots" id="progDots"></div>
      <div class="card-counter" id="cardCounter"></div>
    </div>
    <div class="artist-card" id="artistCard"></div>
    <div id="endCard" class="end-card" style="display:none">
      <i class="ti ti-music-off" aria-hidden="true"></i>
      <h3>You've seen them all</h3>
      <p>Come back tomorrow for fresh finds</p>
      <button class="btn-restart">Shuffle again</button>
    </div>
    <div class="action-hint" id="actionHint">skip or save to your discoveries</div>
    <div class="action-row">
      <button id="btn-skip"  class="btn-skip"  aria-label="Skip"><i class="ti ti-x"           aria-hidden="true"></i></button>
      <button id="btn-info"  class="btn-info"  aria-label="Info"><i class="ti ti-info-circle"  aria-hidden="true"></i></button>
      <button id="btn-heart" class="btn-heart" aria-label="Save"><i class="ti ti-heart"        aria-hidden="true"></i></button>
    </div>
  </div>

  <!-- SAVED -->
  <div id="screen-saved" class="screen">
    <div class="saved-header">
      <h2>My Discoveries</h2>
      <p id="savedCount">0 hidden gems saved</p>
    </div>
    <div class="saved-list" id="savedList"></div>
  </div>

  <!-- NAV -->
  <nav class="bottom-nav" role="navigation" aria-label="Main navigation">
    <button class="nav-btn active" id="nav-home"     aria-label="Home">
      <i class="ti ti-home"      aria-hidden="true"></i><span>Home</span>
    </button>
    <button class="nav-btn"        id="nav-discover" aria-label="Discover">
      <i class="ti ti-sparkles"  aria-hidden="true"></i><span>Discover</span>
    </button>
    <button class="nav-btn"        id="nav-saved"    aria-label="Saved">
      <i class="ti ti-heart"     aria-hidden="true"></i><span>Saved</span>
    </button>
  </nav>

  <div class="toast" id="toast"></div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
